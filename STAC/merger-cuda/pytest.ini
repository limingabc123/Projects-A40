[pytest]
# merger-cuda Test Configuration

# Test paths
testpaths = tests

# Markers
markers =
    cuda: marks tests as requiring CUDA
    slow: marks tests as slow-running

# Verbosity and output
addopts = -v --tb=short

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Minimum pytest version
minversion = 7.0
